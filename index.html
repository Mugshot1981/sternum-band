<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Sternum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0b;
      --bg-soft: #111111;
      --bg-deep: #070707;

      --text: #eaeaea;
      --text-soft: #cfcfcf;
      --text-muted: #a8a8a8;

      --accent: #8b0000;
      --accent-hover: #b52b2b;

      --border: #242424;
      --border-soft: #1b1b1b;

      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-y: scroll;
    }

    h1,
    h2 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 42px;
      margin: 0 0 24px 0;
      color: var(--text);
    }

    p {
      margin: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* FULL SCREEN PANELS */

    .panel {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      padding: 48px 24px;
    }

    .panel.hero {
      position: relative;
      padding: 0;
      background: url('herobanner.jpg') center center / cover no-repeat;
      background-color: black;
      overflow: hidden;
    }

    .panel.hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.14),
        rgba(0, 0, 0, 0.28)
      );
      pointer-events: none;
    }

    .panel.footer-panel {
      min-height: auto;
      padding: 0;
      align-items: stretch;
    }

    /* CONTENT CONTAINER */

    .container {
      width: 100%;
      max-width: 1100px;
    }

    /* HERO CONTENT */

    .hero-content {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    /* BUTTON */

    .metal-btn {
      position: absolute;
      left: 50%;
      top: 78%;
      transform: translate(-50%, -50%);

      min-width: 170px;
      padding: 14px 36px;

      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      line-height: 1.1;
      text-align: center;

      color: #ffffff;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.18);

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease,
        transform 0.2s ease;

      cursor: pointer;
    }

    .metal-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(139, 0, 0, 0.6);
      background: rgba(0, 0, 0, 0.82);
      transform: translate(-50%, calc(-50% - 2px));
    }

    .metal-btn:active {
      transform: translate(-50%, -50%);
    }

    /* CARDS */

    .release-card,
    .about-card {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      box-shadow:
        var(--shadow),
        0 0 10px rgba(139, 0, 0, 0.08);
      padding: 28px;
    }

    /* VIDEO */

    iframe {
      width: 100%;
      height: 420px;
      border: none;
      display: block;
      background: black;
    }

    /* SHOWS */

    .shows-list {
      background: var(--bg-soft);
      border: 1px solid var(--border);
      box-shadow:
        var(--shadow),
        0 0 10px rgba(139, 0, 0, 0.08);
    }

    .show {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
    }

    .show:last-child {
      border-bottom: none;
    }

    .show-date {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      color: var(--text);
    }

    .show-place {
      font-size: 18px;
      color: var(--text-soft);
    }

    /* ABOUT */

    .about-card p {
      max-width: 800px;
      font-size: 18px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    /* FOOTER */

    footer {
      width: 100%;
      text-align: center;
      padding: 48px 24px;
      background: var(--bg-deep);
      border-top: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-size: 15px;
    }

    footer p {
      margin: 8px 0;
    }

    /* SMALL LAPTOPS / TABLETS */

    @media (max-width: 1100px) {
      .panel {
        padding: 40px 20px;
      }

      h2 {
        font-size: 38px;
      }

      iframe {
        height: 360px;
      }

      .metal-btn {
        top: 80%;
      }
    }

    /* MOBILE / IPAD SMALL */

    @media (max-width: 768px) {
      html {
        scroll-snap-type: y proximity;
      }

      .panel {
        min-height: 100svh;
        padding: 28px 16px;
      }

      .panel.hero {
        background: url('herobanner-mobile.jpg') center center / cover no-repeat;
      }

      .panel.hero::before {
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.10),
          rgba(0, 0, 0, 0.22)
        );
      }

      h2 {
        font-size: 34px;
        margin-bottom: 20px;
      }

      .metal-btn {
        top: 84%;
        min-width: 150px;
        padding: 12px 24px;
        font-size: 18px;
        letter-spacing: 1.5px;
        line-height: 1;
      }

      .metal-btn:hover {
        transform: translate(-50%, calc(-50% - 2px));
      }

      .metal-btn:active {
        transform: translate(-50%, -50%);
      }

      iframe {
        height: 240px;
      }

      .show {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .show-date {
        font-size: 24px;
      }

      .show-place {
        font-size: 16px;
      }

      .release-card,
      .about-card {
        padding: 20px;
      }

      .about-card p {
        font-size: 16px;
        line-height: 1.6;
      }
    }

    /* VERY SMALL PHONES */

    @media (max-width: 420px) {
      .metal-btn {
        top: 86%;
        min-width: 140px;
        padding: 11px 20px;
        font-size: 17px;
      }

      h2 {
        font-size: 30px;
      }

      iframe {
        height: 210px;
      }
    }
  </style>
</head>
<body>

  <section class="panel hero">
    <div class="hero-content">
      <a href="#release" class="metal-btn">LISTEN NOW</a>
    </div>
  </section>

  <section class="panel" id="release">
    <div class="container">
      <h2>Latest Release</h2>
      <div class="release-card">
        <iframe
          src="https://www.youtube.com/embed/YOUR_VIDEO"
          title="Latest Release"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

  <section class="panel" id="shows">
    <div class="container">
      <h2>Shows</h2>
      <div class="shows-list">
        <div class="show">
          <div class="show-date">12 APR</div>
          <div class="show-place">Rotterdam — Baroeg</div>
        </div>

        <div class="show">
          <div class="show-date">28 APR</div>
          <div class="show-place">Amsterdam — Melkweg</div>
        </div>
      </div>
    </div>
  </section>

  <section class="panel" id="about">
    <div class="container">
      <h2>About</h2>
      <div class="about-card">
        <p>
          Sternum is een opkomende metalband met een rauwe, moderne sound.
          Strakke riffs, zware breakdowns en energieke live shows.
        </p>
      </div>
    </div>
  </section>

  <section class="panel footer-panel">
    <footer>
      <p>Follow Sternum</p>
      <p>Instagram | Spotify | YouTube</p>
    </footer>
  </section>

</body>
</html>
