
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Sternum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: white;
    }

    h1, h2 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
    }

    .section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    /* HERO */
 .hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;

  background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('herobanner.png');

  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  background-color: black;
}

    .hero h1 {
      font-size: 80px;
      margin: 0;
    }

    .hero button {
      margin-top: 20px;
      padding: 12px 24px;
      background: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* VIDEO */
    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }

    /* SHOWS */
    .show {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      padding: 10px 0;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px;
      background: #111;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>STERNUM</h1>
    <p>Modern Metal from NL</p>
    <button>Luister nu</button>
  </div>
</section>

<!-- RELEASE -->
<section class="section">
  <h2>Latest Release</h2>
  <iframe src="https://www.youtube.com/embed/YOUR_VIDEO"></iframe>
</section>

<!-- SHOWS -->
<section class="section">
  <h2>Shows</h2>

  <div class="show">
    <span>12 Apr</span>
    <span>Rotterdam – Baroeg</span>
  </div>

  <div class="show">
    <span>28 Apr</span>
    <span>Amsterdam – Melkweg</span>
  </div>

</section>

<!-- ABOUT -->
<section class="section">
  <h2>About</h2>
  <p>
    Sternum is een opkomende metalband met een rauwe, moderne sound.
    Strakke riffs, zware breakdowns en energieke live shows.
  </p>
</section>

<!-- FOOTER -->
<footer>
  <p>Follow Sternum</p>
  <p>Instagram | Spotify | YouTube</p>
</footer>

</body>
</html>
