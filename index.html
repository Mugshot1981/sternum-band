<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Sternum</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: white;
    }

    h2 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      font-size: 42px;
      margin: 0 0 24px 0;
    }

    .section {
      padding: 80px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* HERO */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('herobanner.jpg') center center / cover no-repeat;
      background-color: black;
      overflow: hidden;
    }

    /* subtiele overlay, niet zo zwaar dat je logo grijs wordt */
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.28)
        );
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .metal-btn {
      display: inline-block;
      padding: 16px 34px;
      min-width: 180px;

      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      line-height: 1;
      text-decoration: none;
      text-align: center;

      color: #f5f5f5;
      background: linear-gradient(180deg, #2a2a2a 0%, #101010 100%);
      border: 2px solid #7a1f1f;
      border-radius: 2px;

      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 8px 24px rgba(0,0,0,0.45),
        0 0 18px rgba(120, 12, 12, 0.28);

      text-shadow:
        0 1px 0 rgba(0,0,0,0.9),
        0 0 8px rgba(0,0,0,0.5);

      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      cursor: pointer;
    }

    .metal-btn:hover {
      transform: translateY(-2px);
      border-color: #b52b2b;
      background: linear-gradient(180deg, #353535 0%, #121212 100%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.06) inset,
        0 10px 28px rgba(0,0,0,0.5),
        0 0 24px rgba(181, 43, 43, 0.38);
    }

    .metal-btn:active {
      transform: translateY(0);
    }

    /* RELEASE */
    .release-card,
    .about-card {
      background: #111;
      border: 1px solid #242424;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    iframe {
      width: 100%;
      height: 420px;
      border: none;
      display: block;
      background: black;
    }

    /* SHOWS */
    .shows-list {
      background: #111;
      border: 1px solid #242424;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .show {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 16px;
      padding: 18px 22px;
      border-bottom: 1px solid #242424;
    }

    .show:last-child {
      border-bottom: none;
    }

    .show-date {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
      font-size: 28px;
      color: #d9d9d9;
    }

    .show-place {
      font-size: 18px;
      color: #f1f1f1;
    }

    /* ABOUT */
    .about-card p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: #d1d1d1;
      max-width: 800px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 48px 24px;
      background: #0a0a0a;
      border-top: 1px solid #1b1b1b;
      color: #bcbcbc;
      font-size: 15px;
    }

    footer p {
      margin: 8px 0;
    }

    @media (max-width: 768px) {
      .hero {
        background-position: center center;
      }

      .metal-btn {
        font-size: 24px;
        min-width: 160px;
        padding: 14px 28px;
      }

      h2 {
        font-size: 34px;
      }

      .show {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .show-date {
        font-size: 24px;
      }

      .show-place {
        font-size: 16px;
      }

      iframe {
        height: 240px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="hero-content">
      <a href="#release" class="metal-btn">LISTEN NOW</a>
    </div>
  </section>

  <section class="section" id="release">
    <h2>Latest Release</h2>
    <div class="release-card">
      <iframe src="https://www.youtube.com/embed/YOUR_VIDEO"></iframe>
    </div>
  </section>

  <section class="section">
    <h2>Shows</h2>
    <div class="shows-list">
      <div class="show">
        <div class="show-date">12 APR</div>
        <div class="show-place">Rotterdam — Baroeg</div>
      </div>

      <div class="show">
        <div class="show-date">28 APR</div>
        <div class="show-place">Amsterdam — Melkweg</div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>About</h2>
    <div class="about-card">
      <p>
        Sternum is een opkomende metalband met een rauwe, moderne sound.
        Strakke riffs, zware breakdowns en energieke live shows.
      </p>
    </div>
  </section>

  <footer>
    <p>Follow Sternum</p>
    <p>Instagram | Spotify | YouTube</p>
  </footer>

</body>
</html>
